name: Build and deploy
on:
  pull_request:
  push:
  workflow_dispatch:
defaults:
  run:
    shell: nix develop --command bash {0}
jobs:
  build:
    runs-on: nix
    env:
      TZ: America/Denver
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Create directory for user-specific executable files
        run: |
          mkdir -p "${HOME}/.local"
      - name: Verify installations
        run: |
          echo "Dart Sass: $(sass --version)"
          echo "Go: $(go version)"
          echo "Hugo: $(hugo version)"
          echo "Node.js: $(node --version)"
      - name: Install Node.js dependencies
        run: |
          [[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true
      - name: Configure Git
        run: |
          git config core.quotepath false
          git config --global http.sslCAInfo "$GIT_SSL_CAINFO"
      - name: Set deploy config
        id: config
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "base_url=https://sua.dev/" >> "$GITHUB_OUTPUT"
            echo "base_path=/var/www/sua.dev" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            echo "base_url=https://staging.sua.dev/" >> "$GITHUB_OUTPUT"
            echo "base_path=/var/www/staging.sua.dev" >> "$GITHUB_OUTPUT"
          fi
      - name: Source .envrc
        run: |
          source <(grep -v '^use ' .envrc)
          env | grep '^HUGO_PARAMS_' >> "$GITHUB_ENV"
      - name: Build the site
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.config.outputs.base_url || 'https://sua.dev/' }}" \
            --cacheDir "${{ runner.temp }}/hugo_cache"
      - name: Deploy
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ steps.config.outputs.base_path }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          # sync the files
          rsync -avz --delete \
            --chown=admin:nginx \
            --chmod=D770,F660 \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./public/ \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}"
